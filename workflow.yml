name: Build Windows .exe
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install PyQt6 pymobiledevice3 pyinstaller
      - name: Build
        run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: iOSDeviceBridge
          path: dist/iOSDeviceBridge.exe
